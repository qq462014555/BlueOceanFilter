<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品采集器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
        .container { max-width: 1600px; margin: 0 auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #ff6a00, #ee0979); color: #fff; padding: 24px; border-radius: 12px; margin-bottom: 24px; }
        .header h1 { font-size: 24px; margin-bottom: 8px; }
        .header p { opacity: 0.9; font-size: 14px; }

        .input-section { background: #fff; padding: 24px; border-radius: 12px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .input-row { display: flex; gap: 12px; }
        .input-row input { flex: 1; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; outline: none; transition: border-color 0.2s; }
        .input-row input:focus { border-color: #ff6a00; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: #ff6a00; color: #fff; }
        .btn-primary:hover { background: #e55d00; }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
        .btn-batch { background: #4a90d9; color: #fff; margin-top: 12px; }
        .btn-batch:hover { background: #3a7fc8; }
        .btn-batch:disabled { background: #ccc; cursor: not-allowed; }
        .btn-rpa { background: #52c41a; color: #fff; margin-top: 12px; margin-left: 12px; }
        .btn-rpa:hover { background: #45b018; }
        .btn-rpa:disabled { background: #ccc; cursor: not-allowed; }
        .btn-chrome { background: #722ed1; color: #fff; margin-top: 12px; }
        .btn-chrome:hover { background: #642abf; }
        .btn-chrome:disabled { background: #ccc; cursor: not-allowed; }
        .btn-chrome-merchant { background: #13c2c2; color: #fff; margin-top: 12px; margin-left: 12px; }
        .btn-chrome-merchant:hover { background: #0fa8a8; }
        .btn-chrome-merchant:disabled { background: #ccc; cursor: not-allowed; }
        .nav-bar { display: flex; gap: 12px; justify-content: center; margin-bottom: 24px; }
        .nav-bar a { padding: 10px 24px; background: #fff; color: #1890ff; border: 2px solid #1890ff; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: 600; transition: all 0.2s; }
        .nav-bar a:hover { background: #1890ff; color: #fff; }
        .nav-bar a.active { background: #1890ff; color: #fff; }

        .status-bar { background: #fff; padding: 16px 24px; border-radius: 12px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); display: flex; align-items: center; gap: 16px; }
        .status-bar.hidden { display: none; }
        .console-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1100; }
        .console-modal.active { display: flex; }
        .console-modal-content { background: #1a1a1a; border-radius: 12px; width: 90%; max-width: 900px; max-height: 80vh; display: flex; flex-direction: column; overflow: hidden; border: 1px solid #333; box-shadow: 0 8px 40px rgba(0,0,0,0.5); }
        .console-modal-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; background: #2d2d2d; color: #eee; font-size: 14px; font-weight: 600; border-bottom: 1px solid #444; }
        .console-modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: #888; padding: 0 6px; line-height: 1; }
        .console-modal-close:hover { color: #fff; }
        .console-modal-body { flex: 1; overflow-y: auto; padding: 6px 0; font-family: 'Consolas', 'Courier New', monospace; font-size: 13px; line-height: 1.6; color: #d4d4d4; background: #1a1a1a; min-height: 200px; max-height: 60vh; }
        .console-modal-body::-webkit-scrollbar { width: 6px; }
        .console-modal-body::-webkit-scrollbar-track { background: #2d2d2d; }
        .console-modal-body::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
        .console-line { padding: 3px 20px; word-break: break-all; white-space: pre-wrap; display: block; border-bottom: 1px solid #252525; font-size: 13px; line-height: 1.5; }
        .console-line:last-child { border-bottom: none; }
        .console-line.info { color: #6bc; }
        .console-line.success { color: #6c6; }
        .console-line.error { color: #e66; }
        .console-line.warn { color: #ea6; }
        .console-line.step { color: #c9a; font-weight: 600; }
        .spinner { width: 20px; height: 20px; border: 3px solid #e0e0e0; border-top-color: #ff6a00; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status-text { flex: 1; font-size: 14px; }
        .status-progress { font-size: 13px; color: #666; }

        .product-card { background: #fff; border-radius: 12px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden; }
        .product-info { padding: 24px; border-bottom: 1px solid #f0f0f0; }
        .product-title-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 8px; }
        .product-title-row .label { font-size: 13px; color: #999; white-space: nowrap; min-width: 64px; }
        .product-title-row .title-value { font-size: 18px; font-weight: 600; color: #666; }
        .product-title { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 8px; flex: 1; }
        .product-title .title-text { flex: 1; cursor: pointer; padding: 4px 8px; border-radius: 4px; transition: background 0.2s; }
        .product-title .title-text:hover { background: #f0f0f0; }
        .product-title .edit-btn { background: none; border: 1px solid #d9d9d9; border-radius: 4px; padding: 2px 8px; font-size: 12px; cursor: pointer; color: #666; transition: all 0.2s; }
        .product-title .edit-btn:hover { border-color: #ff6a00; color: #ff6a00; }
        .product-title .save-btn { background: #ff6a00; border: 1px solid #ff6a00; border-radius: 4px; padding: 2px 8px; font-size: 12px; cursor: pointer; color: #fff; }
        .product-title .cancel-btn { background: #fff; border: 1px solid #d9d9d9; border-radius: 4px; padding: 2px 8px; font-size: 12px; cursor: pointer; color: #666; }
        .product-title-input { font-size: 18px; font-weight: 600; flex: 1; padding: 4px 8px; border: 2px solid #ff6a00; border-radius: 4px; outline: none; }
        .product-meta { display: flex; gap: 16px; font-size: 13px; color: #666; }
        .product-meta span { background: #f5f5f5; padding: 4px 10px; border-radius: 4px; }
        .product-meta .dir-link { background: #fff2e8; color: #ff6a00; cursor: pointer; border-radius: 4px; padding: 4px 10px; font-weight: 600; transition: all 0.2s; }
        .product-meta .dir-link:hover { background: #ff6a00; color: #fff; }

        .section { padding: 24px; }
        .section-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .section-title .badge { background: #ff6a00; color: #fff; font-size: 12px; padding: 2px 8px; border-radius: 10px; }

        .image-grid { display: flex; flex-wrap: wrap; gap: 12px; }
        .image-grid img { width: 120px; height: 120px; object-fit: cover; border-radius: 8px; border: 1px solid #e0e0e0; cursor: pointer; transition: transform 0.2s; }
        .image-grid img:hover { transform: scale(1.05); }
        .image-grid .img-item { display: inline-block; position: relative; }
        .image-grid .img-item.selected { outline: 2px solid #ff6a00; outline-offset: 2px; border-radius: 8px; }
        .image-grid .img-item .img-checkbox { position: absolute; top: 4px; left: 4px; z-index: 2; width: 18px; height: 18px; accent-color: #ff6a00; cursor: pointer; }
        .image-grid .img-wrap { position: relative; display: block; transition: border-color 0.2s, opacity 0.2s; border-radius: 8px; }
        .image-grid .img-actions-bar { display: flex; gap: 4px; justify-content: center; margin-top: 6px; }
        .image-grid .img-actions-bar .action-btn { background: #f5f5f5; border: 1px solid #d9d9d9; border-radius: 4px; padding: 2px 8px; font-size: 11px; cursor: pointer; color: #666; transition: all 0.2s; }
        .image-grid .img-actions-bar .action-btn:hover { border-color: #ff6a00; color: #ff6a00; }
        .image-grid .img-actions-bar .action-btn.delete-btn:hover { border-color: #ff4d4f; color: #ff4d4f; }
        .image-grid .img-actions-bar .action-btn.restore-btn { background: #f6ffed; border-color: #52c41a; color: #52c41a; display: none; }
        .image-grid .img-actions-bar .action-btn.restore-btn.visible { display: inline-block; }

        .batch-bar { display: none; align-items: center; gap: 8px; margin-left: 12px; }
        .batch-bar.active { display: inline-flex; }
        .batch-btn { background: #f5f5f5; border: 1px solid #d9d9d9; border-radius: 4px; padding: 1px 8px; font-size: 11px; cursor: pointer; color: #666; transition: all 0.2s; }
        .batch-btn:hover { border-color: #ff6a00; color: #ff6a00; }
        .batch-btn.danger { background: #fff1f0; border-color: #ff4d4f; color: #ff4d4f; }
        .batch-btn.danger:hover { background: #ff4d4f; color: #fff; }
        .batch-count { font-size: 11px; color: #ff6a00; font-weight: 600; }
        /* Drag states */
        .image-grid .img-item.dragging { opacity: 0.3 !important; transform: scale(0.9); border: 2px dashed #ff6a00; border-radius: 10px; }
        .image-grid .img-item.drag-ghost { position: fixed; width: 120px; height: 120px; pointer-events: none; z-index: 9999; opacity: 0.92; transform: rotate(3deg) scale(1.08); box-shadow: 0 8px 30px rgba(255,106,0,0.4); border-radius: 10px; overflow: hidden; transition: none; }
        .image-grid .img-item.drag-ghost img { width: 100%; height: 100%; object-fit: cover; }
        .drop-indicator { position: absolute; width: 4px; background: #ff6a00; border-radius: 2px; transition: all 0.15s ease; pointer-events: none; z-index: 10; box-shadow: 0 0 10px rgba(255,106,0,0.7); }
        .image-grid .img-label { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.6); color: #fff; font-size: 11px; text-align: center; padding: 2px 4px; border-radius: 0 0 8px 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .image-grid .img-placeholder { width: 120px; height: 120px; border: 2px dashed #d9d9d9; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; color: #999; font-size: 12px; transition: all 0.2s; background: #fafafa; }
        .image-grid .img-placeholder:hover { border-color: #ff6a00; color: #ff6a00; background: #fff2e8; }
        .image-grid .img-placeholder .placeholder-icon { font-size: 28px; margin-bottom: 4px; }
        .image-grid .img-placeholder .placeholder-text { font-size: 11px; }
        .upload-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1300; }
        .upload-modal.active { display: flex; }
        .upload-modal-content { background: #fff; border-radius: 12px; width: 90%; max-width: 500px; overflow: hidden; }
        .upload-modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid #f0f0f0; }
        .upload-modal-header h3 { font-size: 16px; font-weight: 600; }
        .upload-modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: #999; padding: 0 4px; }
        .upload-modal-close:hover { color: #333; }
        .upload-modal-tabs { display: flex; border-bottom: 1px solid #f0f0f0; }
        .upload-modal-tab { flex: 1; padding: 12px 0; text-align: center; font-size: 13px; font-weight: 600; cursor: pointer; color: #999; border-bottom: 2px solid transparent; transition: all 0.2s; background: none; border-top: none; border-left: none; border-right: none; }
        .upload-modal-tab:hover { color: #666; }
        .upload-modal-tab.active { color: #ff6a00; border-bottom-color: #ff6a00; }
        .upload-modal-body { padding: 24px; }
        .upload-modal-body .upload-option { margin-bottom: 16px; }
        .upload-modal-body .upload-option label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #333; }
        .upload-modal-body .upload-option input[type="text"], .upload-modal-body .upload-option input[type="file"] { width: 100%; padding: 8px 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 13px; outline: none; }
        .upload-modal-body .upload-option input[type="text"]:focus { border-color: #ff6a00; }
        .upload-modal-body .tab-content { display: none; }
        .upload-modal-body .tab-content.active { display: block; }
        .upload-modal-body .image-select-grid { display: flex; flex-wrap: wrap; gap: 10px; max-height: 300px; overflow-y: auto; }
        .upload-modal-body .image-select-item { width: 80px; height: 80px; border: 2px solid #e0e0e0; border-radius: 8px; cursor: pointer; overflow: hidden; transition: all 0.2s; }
        .upload-modal-body .image-select-item:hover { border-color: #ff6a00; }
        .upload-modal-body .image-select-item.selected { border-color: #ff6a00; box-shadow: 0 0 4px rgba(255,106,0,0.4); }
        .upload-modal-body .image-select-item img { width: 100%; height: 100%; object-fit: cover; }
        .upload-modal-body .empty-hint { text-align: center; color: #999; font-size: 13px; padding: 30px 0; }
        .upload-modal-body .paste-hint { font-size: 12px; color: #999; margin-top: 8px; padding: 8px 12px; background: #fafafa; border-radius: 6px; }
        .upload-modal-footer { padding: 12px 24px; border-top: 1px solid #f0f0f0; display: flex; justify-content: flex-end; gap: 8px; }

        /* Video section styles */
        .video-item { display: inline-block; margin: 8px 0; }
        .video-wrap { position: relative; border-radius: 8px; overflow: hidden; background: #000; }
        .video-wrap video { display: block; max-width: 100%; max-height: 300px; border-radius: 8px; }
        .video-label { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.6); color: #fff; font-size: 11px; text-align: center; padding: 2px 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .video-actions-bar { display: flex; gap: 4px; justify-content: center; margin-top: 6px; }
        .video-actions-bar .action-btn { background: #f5f5f5; border: 1px solid #d9d9d9; border-radius: 4px; padding: 2px 8px; font-size: 11px; cursor: pointer; color: #666; transition: all 0.2s; }
        .video-actions-bar .action-btn:hover { border-color: #ff6a00; color: #ff6a00; }
        .video-actions-bar .action-btn.delete-btn:hover { border-color: #ff4d4f; color: #ff4d4f; }
        .video-actions-bar .action-btn.restore-btn { background: #f6ffed; border-color: #52c41a; color: #52c41a; display: none; }
        .video-actions-bar .action-btn.restore-btn.visible { display: inline-block; }
        .video-placeholder { width: 200px; height: 140px; border: 2px dashed #d9d9d9; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; color: #999; font-size: 12px; transition: all 0.2s; background: #fafafa; }
        .video-placeholder:hover { border-color: #ff6a00; color: #ff6a00; background: #fff2e8; }
        .video-placeholder .placeholder-icon { font-size: 32px; margin-bottom: 4px; }
        .video-placeholder .placeholder-text { font-size: 12px; }

        /* Video upload modal */
        .video-upload-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1100; }
        .video-upload-modal.active { display: flex; }
        .video-upload-modal-content { background: #fff; border-radius: 12px; width: 90%; max-width: 500px; overflow: hidden; }
        .video-upload-modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid #f0f0f0; }
        .video-upload-modal-header h3 { font-size: 16px; font-weight: 600; }
        .video-upload-modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: #999; padding: 0 4px; }
        .video-upload-modal-close:hover { color: #333; }
        .video-upload-modal-body { padding: 24px; }
        .video-upload-modal-body .upload-option { margin-bottom: 16px; }
        .video-upload-modal-body .upload-option label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #333; }
        .video-upload-modal-body .upload-option input[type="text"], .video-upload-modal-body .upload-option input[type="file"] { width: 100%; padding: 8px 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 13px; outline: none; }
        .video-upload-modal-body .upload-option input[type="text"]:focus { border-color: #ff6a00; }
        .video-upload-modal-body .paste-hint { font-size: 12px; color: #999; margin-top: 8px; padding: 8px 12px; background: #fafafa; border-radius: 6px; }
        .video-upload-modal-footer { padding: 12px 24px; border-top: 1px solid #f0f0f0; display: flex; justify-content: flex-end; gap: 8px; }

        .sku-table { width: 100%; border-collapse: collapse; }
        .sku-table th, .sku-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        .sku-table th { background: #fafafa; font-weight: 600; }
        .sku-table tr:hover { background: #fafafa; }
        .sku-img { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; }
        .sku-spec-name-cell { cursor: pointer; transition: background 0.2s; }
        .sku-spec-name-cell:hover { background: #fff2e8 !important; }
        .sku-spec-name-input { width: 100%; padding: 4px 8px; border: 2px solid #ff6a00; border-radius: 4px; font-size: 14px; outline: none; }
        .price { color: #ff6a00; font-weight: 600; }
        .original-price { color: #999; text-decoration: line-through; font-size: 12px; }


        .empty-state { text-align: center; padding: 60px 20px; color: #999; }
        .empty-state svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.3; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 9999 !important; cursor: pointer; }
        .modal.active { display: flex !important; }
        .modal img { max-width: 90%; max-height: 90%; max-width: min(90vw, 800px); max-height: min(90vh, 600px); object-fit: contain; border-radius: 8px; }
        .modal-nav { position:absolute; top:50%; transform:translateY(-50%); font-size:40px; color:#fff; cursor:pointer; padding:20px; user-select:none; opacity:0.6; z-index:2001; }
        .modal-nav:hover { opacity:1; }
        .modal-nav-left { left:10px; }
        .modal-nav-right { right:10px; }
        .modal-counter { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); color:#fff; font-size:14px; opacity:0.7; z-index:2001; }

        /* Toast notification */
        .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2000; padding: 16px 28px; border-radius: 12px; font-size: 14px; font-weight: 500; box-shadow: 0 8px 30px rgba(0,0,0,0.25); pointer-events: none; opacity: 0; transition: all 0.3s ease; max-width: 400px; text-align: center; }
        .toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
        .toast.success { background: #52c41a; color: #fff; }
        .toast.error { background: #ff4d4f; color: #fff; }
        .toast.info { background: #1890ff; color: #fff; }

        /* Confirm dialog */
        .confirm-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 2100; }
        .confirm-overlay.show { display: flex; }
        .confirm-dialog { background: #fff; border-radius: 12px; padding: 32px 28px 24px; max-width: 360px; width: 90%; text-align: center; box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
        .confirm-dialog .confirm-icon { width: 48px; height: 48px; margin: 0 auto 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .confirm-dialog .confirm-icon.warning { background: #fff7e6; color: #fa8c16; }
        .confirm-dialog .confirm-icon.danger { background: #fff1f0; color: #ff4d4f; }
        .confirm-dialog .confirm-message { font-size: 15px; color: #333; margin-bottom: 24px; line-height: 1.6; }
        .confirm-dialog .confirm-actions { display: flex; gap: 12px; justify-content: center; }
        .confirm-dialog .confirm-btn { padding: 8px 28px; border: 1px solid #d9d9d9; border-radius: 8px; font-size: 14px; cursor: pointer; background: #f5f5f5; color: #666; transition: all 0.2s; }
        .confirm-dialog .confirm-btn:hover { border-color: #999; color: #333; }
        .confirm-dialog .confirm-btn.primary { background: #ff4d4f; border-color: #ff4d4f; color: #fff; }
        .confirm-dialog .confirm-btn.primary:hover { background: #ff7875; }

        /* 图片替换弹窗 */
        .replace-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1100; }
        .replace-modal.active { display: flex; }
        .replace-modal-content { background: #fff; border-radius: 12px; width: 90%; max-width: 800px; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; }
        .replace-modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid #f0f0f0; }
        .replace-modal-header h3 { font-size: 16px; font-weight: 600; }
        .replace-modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: #999; padding: 0 4px; }
        .replace-modal-close:hover { color: #333; }
        .replace-modal-body { padding: 20px 24px; overflow-y: auto; flex: 1; }
        .replace-modal-body .section-group { margin-bottom: 20px; }
        .replace-modal-body .section-group-title { font-size: 14px; font-weight: 600; margin-bottom: 10px; color: #ff6a00; }
        .replace-modal-body .replace-grid { display: flex; flex-wrap: wrap; gap: 10px; }
        .replace-modal-body .replace-option { width: 80px; height: 80px; border: 2px solid #e0e0e0; border-radius: 8px; cursor: pointer; overflow: hidden; transition: border-color 0.2s; }
        .replace-modal-body .replace-option:hover { border-color: #ff6a00; }
        .replace-modal-body .replace-option.selected { border-color: #ff6a00; box-shadow: 0 0 4px rgba(255,106,0,0.4); }
        .replace-modal-body .replace-option img { width: 100%; height: 100%; object-fit: cover; }
        .replace-modal-footer { padding: 12px 24px; border-top: 1px solid #f0f0f0; display: flex; justify-content: flex-end; gap: 8px; }
        .replace-modal-footer .btn { padding: 8px 20px; font-size: 13px; }

        /* AI 主图重绘弹窗 */
        .ai-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1200; }
        .ai-modal.active { display: flex; }
        .ai-modal-content { background: #fff; border-radius: 12px; width: 95%; max-width: 1600px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
        .ai-modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid #f0f0f0; }
        .ai-modal-header h3 { font-size: 18px; font-weight: 600; }
        .ai-modal-close { background: none; border: none; font-size: 28px; cursor: pointer; color: #999; padding: 0 6px; }
        .ai-modal-close:hover { color: #333; }
        .ai-modal-body { padding: 20px 24px; overflow-y: auto; height: auto; min-height: 550px; }
        .ai-modal-footer { padding: 12px 24px; border-top: 1px solid #f0f0f0; display: flex; justify-content: flex-end; align-items: center; gap: 12px; }
        .btn-ai-redraw { background: linear-gradient(135deg, #667eea, #764ba2); border: none; color: #fff; padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-left: 8px; }
        .btn-ai-redraw:hover { transform: scale(1.03); box-shadow: 0 4px 16px rgba(102,126,234,0.4); }
        .ai-tab-bar { display: flex; gap: 8px; margin-bottom: 16px; }
        .ai-tab { flex:1; padding:10px; border:2px solid #e0e0e0; border-radius:8px; cursor:pointer; font-size:13px; font-weight:600; background:#fff; text-align:center; transition:all 0.2s; }
        .ai-tab:hover { border-color:#667eea; color:#667eea; }
        .ai-tab.active { background:#667eea; color:#fff; border-color:#667eea; }
        .ai-tab-content { min-height:1400px; }
        .btn-ai-generate { background: linear-gradient(135deg, #667eea, #764ba2); border: none; color: #fff; padding: 10px 32px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-ai-generate:hover { transform: scale(1.03); box-shadow: 0 4px 16px rgba(102,126,234,0.4); }
        .btn-ai-generate:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-ai-refresh { background: #fff; border: 1px solid #1d39c4; color: #1d39c4; border-radius: 6px; padding: 3px 12px; font-size: 12px; cursor: pointer; transition: all 0.2s; font-weight: 600; }
        .btn-ai-refresh:hover { background: #1d39c4; color: #fff; }
        .ai-modal .platform-select { display: flex; gap: 8px; margin-bottom: 16px; }
        .ai-modal .platform-select button { padding: 8px 20px; border: 2px solid #e0e0e0; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; background: #fff; transition: all 0.2s; }
        .ai-modal .platform-select button:hover { border-color: #667eea; }
        .ai-modal .platform-select button.active { background: #667eea; color: #fff; border-color: #667eea; }
        .ai-modal .prompt-section { background: #f8f9ff; border-radius: 10px; padding: 16px; margin-bottom: 12px; }
        .ai-modal .prompt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .ai-modal .prompt-item { display: flex; flex-direction: column; gap: 4px; }
        .ai-modal .prompt-item-header { display: flex; justify-content: space-between; align-items: center; }
        .ai-modal .prompt-check { font-size: 11px; color: #667eea; cursor: pointer; display: flex; align-items: center; gap: 3px; user-select: none; }
        .ai-modal .prompt-check input { cursor: pointer; }
        .ai-modal .prompt-item .img-label { font-size: 11px; color: #999; }
        .ai-modal .prompt-item textarea { padding: 10px 14px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; height: 120px; resize: vertical; outline: none; font-family: inherit; line-height: 1.5; }
        .ai-modal .prompt-item textarea:focus { border-color: #667eea; }
        .btn-optimize-prompt { margin-top:4px; padding:4px 10px; border:1px solid #52c41a; border-radius:4px; font-size:11px; background:#f6ffed; color:#52c41a; cursor:pointer; transition:all 0.2s; }
        .btn-optimize-prompt:hover { background:#52c41a; color:#fff; }
        .btn-optimize-prompt:disabled { background:#f5f5f5; color:#999; border-color:#d9d9d9; cursor:not-allowed; }
        .ai-modal .model-select { display: flex; align-items: center; gap: 12px; padding: 16px; background: #fafafa; border-radius: 10px; margin-bottom: 12px; }
        .ai-modal .model-select label { font-size: 13px; font-weight: 600; white-space: nowrap; }
        .ai-modal .model-select select { flex: 1; padding: 8px 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 13px; outline: none; }
        .ai-modal .model-select select:focus { border-color: #667eea; }
        .ai-analysis-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .ai-analysis-item { background: #fff; border-radius: 6px; padding: 8px 12px; }
        .ai-analysis-item .label { font-size: 11px; color: #667eea; font-weight: 600; margin-bottom: 2px; }
        .ai-analysis-item div:last-child { font-size: 12px; color: #333; line-height: 1.4; }

        .log-section { background: #1e1e1e; color: #d4d4d4; padding: 16px 24px; border-radius: 12px; margin-bottom: 24px; max-height: 200px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 12px; }
        .log-section.hidden { display: none; }

        .error-section { background: #fff2f0; border: 1px solid #ffccc7; border-radius: 12px; padding: 20px 24px; margin-bottom: 24px; display: flex; align-items: center; gap: 16px; }
        .error-section.hidden { display: none; }
        .error-section .error-icon { width: 32px; height: 32px; background: #ff4d4f; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; flex-shrink: 0; }
        .error-section .error-message { color: #cf1322; font-size: 14px; line-height: 1.6; }

        /* 两栏布局 */
        .main-layout { display: flex; gap: 20px; align-items: flex-start; }
        .sidebar {
            width: 220px; flex-shrink: 0; position: sticky; top: 20px;
            background: #fff; border-radius: 12px; padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); max-height: 80vh; overflow-y: auto;
        }
        .sidebar-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: #333; }
        .sidebar-item {
            display: block; padding: 8px 12px; font-size: 13px; color: #333;
            text-decoration: none; border-radius: 6px; margin-bottom: 4px;
            cursor: pointer; transition: all 0.2s; line-height: 1.4;
            border-left: 3px solid transparent; word-break: break-all;
        }
        .sidebar-item:hover { background: #f5f5f5; border-left-color: #ff6a00; }
        .sidebar-item.active { background: #fff2e8; border-left-color: #ff6a00; color: #ff6a00; font-weight: 600; }
        .main-content { flex: 1; min-width: 0; }

        /* SortableJS 拖拽样式 */
        .sortable-ghost { opacity: 0.3; transform: scale(0.95); }
        .sortable-chosen { box-shadow: 0 0 0 2px #ff6a00; }
        .sortable-drag { opacity: 0.95; transform: rotate(2deg) scale(1.05); box-shadow: 0 12px 40px rgba(255,106,0,0.4); border-radius: 8px; }
        .sku-table-draggable tbody tr.sku-row { cursor: grab; }
        .sku-table-draggable tbody tr.sku-row:active { cursor: grabbing; }
        .sku-table .sku-delete-btn { background: none; border: none; color: #999; cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 4px; transition: all 0.2s; }
        .sku-table .sku-delete-btn:hover { color: #ff4d4f; background: #fff1f0; }
        .section-title .sku-add-btn { background: #52c41a; border: none; color: #fff; cursor: pointer; font-size: 12px; padding: 2px 10px; border-radius: 4px; transition: all 0.2s; margin-left: 8px; }
        .section-title .sku-add-btn:hover { background: #45b018; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1> 商品采集器</h1>
            <p>输入商品链接或批量抓取链接文件中的全部商品</p>
        </div>

        <div class="nav-bar">
            <a href="/index.html">蓝海词筛选</a>
            <a href="/chat.html">AI 对话</a>
            <a href="/trend.html">趋势词挖掘</a>
            <a href="/scraper.html" class="active">1688 采集</a>
            <a href="/file-manager.html">文件管理</a>
            <a href="/openclaw.html">OpenClaw</a>
        </div>

        <div class="input-section">
            <div class="input-row">
                <input type="text" id="urlInput" placeholder="输入1688商品链接，例如: https://detail.1688.com/offer/748546257692.html">
                <button class="btn btn-primary" id="scrapeBtn" onclick="scrapeSingle()">开始采集</button>
            </div>
            <button class="btn btn-batch" id="batchBtn" onclick="startBatch()">批量抓取全部商品</button>
            <button class="btn btn-rpa" id="rpaBtn" onclick="startFromRpa()">从RPA文件获取</button>
            <button class="btn btn-chrome" id="chromeBtn" onclick="launchChrome()">启动Chrome(9222-采集)</button>

            <div style="display:flex;align-items:center;gap:8px;margin-top:12px;">
                <label style="font-size:14px;color:#666;">选择日期:</label>
                <input type="date" id="dateInput" style="padding:8px 12px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none;">
                <button class="btn btn-primary" style="padding:8px 16px;font-size:14px;" onclick="loadProductsByDate()">加载数据</button>
                <span id="dateStatus" style="font-size:13px;color:#999;"></span>
            </div>
        </div>

        <div class="status-bar hidden" id="statusBar">
            <div class="spinner"></div>
            <div>
                <div class="status-text" id="statusText">正在抓取...</div>
                <div class="status-progress" id="statusProgress"></div>
            </div>
        </div>

        <!-- 采集日志弹窗 -->
        <div class="console-modal" id="consoleModal">
            <div class="console-modal-content">
                <div class="console-modal-header">
                    <span>📋 采集日志</span>
                    <button class="console-modal-close" onclick="hideConsole()">&times;</button>
                </div>
                <div class="console-modal-body" id="consoleBody"></div>
            </div>
        </div>

        <div class="error-section hidden" id="errorSection">
            <div class="error-icon">!</div>
            <div class="error-message" id="errorMessage"></div>
        </div>

        <div class="main-layout" id="mainLayout">
            <div class="sidebar hidden" id="sidebar">
                <div class="sidebar-title">商品列表</div>
                <div id="sidebarItems"></div>
            </div>
            <div class="main-content" id="results"></div>
        </div>
    </div>

    <div class="modal" id="imageModal">
        <span class="modal-nav modal-nav-left" id="modalPrev" onclick="event.stopPropagation();galleryPrev()">&#10094;</span>
        <img id="modalImage" src="" alt="" onclick="closeModal()">
        <span class="modal-nav modal-nav-right" id="modalNext" onclick="event.stopPropagation();galleryNext()">&#10095;</span>
        <span class="modal-counter" id="modalCounter"></span>
    </div>

    <!-- 图片替换选择弹窗 -->
    <div class="replace-modal" id="replaceModal">
        <div class="replace-modal-content">
            <div class="replace-modal-header">
                <h3 id="replaceModalTitle">选择替换图片</h3>
                <button class="replace-modal-close" onclick="closeReplaceModal()">&times;</button>
            </div>
            <div class="replace-modal-body" id="replaceModalBody"></div>
            <div class="replace-modal-footer">
                <button class="btn" style="background:#f5f5f5;color:#666;" onclick="closeReplaceModal()">取消</button>
                <button class="btn btn-primary" id="replaceConfirmBtn" onclick="confirmReplace()" disabled>确认替换</button>
            </div>
        </div>
    </div>

    <!-- 确认对话框 -->
    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-dialog">
            <div class="confirm-icon" id="confirmIcon">!</div>
            <div class="confirm-message" id="confirmMessage"></div>
            <div class="confirm-actions">
                <button class="confirm-btn" id="confirmCancelBtn" onclick="confirmCancel()">取消</button>
                <button class="confirm-btn primary" id="confirmOkBtn" onclick="confirmOk()">确定</button>
            </div>
        </div>
    </div>

    <!-- 图片上传弹窗 -->
    <div class="upload-modal" id="uploadModal">
        <div class="upload-modal-content">
            <div class="upload-modal-header">
                <h3 id="uploadModalTitle">上传图片</h3>
                <button class="upload-modal-close" onclick="closeUploadModal()">&times;</button>
            </div>
            <div class="upload-modal-tabs">
                <button class="upload-modal-tab active" data-tab="local" onclick="switchUploadTab('local')">本地上传</button>
                <button class="upload-modal-tab" data-tab="main" onclick="switchUploadTab('main')">所有主图</button>
                <button class="upload-modal-tab" data-tab="detail" onclick="switchUploadTab('detail')">所有详情图</button>
            </div>
            <div class="upload-modal-body">
                <div class="tab-content active" id="tabLocal">
                    <div class="upload-option">
                        <label>选择本地文件</label>
                        <input type="file" id="uploadFileInput" accept="image/*" onchange="onFileSelected(this)">
                    </div>
                    <div class="upload-option">
                        <label>图片URL</label>
                        <input type="text" id="uploadUrlInput" placeholder="粘贴图片链接...">
                    </div>
                    <div class="paste-hint">也可从外部复制图片后，在此处按 Ctrl+V 粘贴</div>
                </div>
                <div class="tab-content" id="tabMain">
                    <div class="image-select-grid" id="mainImageGrid"></div>
                </div>
                <div class="tab-content" id="tabDetail">
                    <div class="image-select-grid" id="detailImageGrid"></div>
                </div>
            </div>
            <div class="upload-modal-footer">
                <button class="btn" style="background:#f5f5f5;color:#666;" onclick="closeUploadModal()">取消</button>
                <button class="btn btn-primary" id="uploadConfirmBtn" onclick="confirmUpload()">确认上传</button>
            </div>
        </div>
    </div>

    <!-- 视频上传弹窗 -->
    <div class="video-upload-modal" id="videoUploadModal">
        <div class="video-upload-modal-content">
            <div class="video-upload-modal-header">
                <h3 id="videoUploadModalTitle">上传视频</h3>
                <button class="video-upload-modal-close" onclick="closeVideoUploadModal()">&times;</button>
            </div>
            <div class="video-upload-modal-body">
                <div class="upload-option">
                    <label>选择本地文件</label>
                    <input type="file" id="videoFileInput" accept="video/mp4,video/webm,video/ogg,video/quicktime" onchange="onVideoFileSelected(this)">
                </div>
                <div class="upload-option">
                    <label>视频URL</label>
                    <input type="text" id="videoUrlInput" placeholder="粘贴视频链接或下载链接...">
                </div>
                <div class="paste-hint">支持 mp4、webm 格式，URL 将自动下载</div>
            </div>
            <div class="video-upload-modal-footer">
                <button class="btn" style="background:#f5f5f5;color:#666;" onclick="closeVideoUploadModal()">取消</button>
                <button class="btn btn-primary" id="videoUploadConfirmBtn" onclick="confirmVideoUpload()">确认上传</button>
            </div>
        </div>
    </div>

    <!-- JS 模块按依赖顺序加载 -->
    <script src="/js/Sortable.min.js"></script>
    <script src="/js/scraper-utils.js?v=2"></script>
    <script src="/js/scraper-main-image.js?v=4"></script>
    <script src="/js/scraper-detail-image.js?v=2"></script>
    <script src="/js/scraper-sku-image.js?v=8"></script>
    <script src="/js/scraper-image.js?v=15"></script>
    <!-- AI 主图重绘弹窗 -->
    <div class="ai-modal" id="aiRedrawModal">
        <div class="ai-modal-content">
            <div class="ai-modal-header">
                <h3>🎨 AI 主图重绘</h3>
                <button class="ai-modal-close" onclick="closeAiRedrawModal()">&times;</button>
            </div>
            <div class="ai-modal-body" id="aiModalBody">
                <!-- AI 分析结果（三个标签共用） -->
                <div class="ai-analysis-section" id="aiAnalysisSection" style="display:none;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
                        <span style="font-size:13px;color:#1d39c4;font-weight:600;">📊 AI 商品分析</span>
                        <button class="btn-ai-refresh" onclick="refreshAiAnalysis()">🔄 刷新</button>
                    </div>
                    <div class="ai-analysis-grid" id="aiAnalysisGrid"></div>
                </div>

                <!-- 白底图区域（固定容器，不动态删除） -->
                <div class="ai-whitebg-grid" id="aiWhiteBgContainer" style="display:none;margin-top:12px;padding-top:12px;border-top:1px solid #d6e4ff;"></div>

                <!-- 三个操作标签 -->
                <div class="ai-tab-bar" id="aiTabBar">
                    <button class="ai-tab active" data-tab="reference">📷 参考图</button>
                    <button class="ai-tab" data-tab="replace">🔄 替换图</button>
                    <button class="ai-tab" data-tab="generate">🎨 自定义生成主图</button>
                </div>

                <!-- 平台选择 -->
                <div class="platform-select" id="aiPlatformSelect">
                    <button class="active" data-platform="taobao">淘宝</button>
                    <button data-platform="douyin">抖音</button>
                    <button data-platform="shopee">虾皮</button>
                </div>

                <!-- Tab: 参考图 -->
                <div class="ai-tab-content" id="aiTabReference" style="display:block;">
                    <div style="font-size:13px;font-weight:600;margin-bottom:12px;">📷 参考图</div>
                    <div class="image-grid" id="aiReferenceGrid"></div>
                </div>

                <!-- Tab: 替换图 -->
                <div class="ai-tab-content" id="aiTabReplace" style="display:none;">
                    <div style="font-size:13px;font-weight:600;margin-bottom:12px;">🔄 替换图</div>
                    <div class="image-grid" id="aiReplaceGrid">
                        <div class="img-item">
                            <div class="img-placeholder" onclick="openReplaceUpload(this)">
                                <div class="placeholder-icon">+</div>
                                <div class="placeholder-text">添加图</div>
                            </div>
                        </div>
                    </div>
                    <div class="model-select" style="margin-top:12px;">
                        <label>图生成ai模型：</label>
                        <select id="aiReplaceModelSelect"></select>
                    </div>
                    <div style="margin-top:12px;display:flex;justify-content:space-between;align-items:center;">
                        <span id="aiReplaceStatus" style="font-size:12px;color:#999;"></span>
                        <button class="btn-ai-generate" id="aiReplaceBtn" onclick="generateReplaceImages()" style="padding:6px 20px;font-size:12px;">🚀 生成替换图</button>
                    </div>
                </div>

                <!-- Tab: 自定义生成主图 -->
                <div class="ai-tab-content" id="aiTabGenerate" style="display:none;">
                    <div class="prompt-section" id="aiPromptSection">
                        <div style="font-size:13px;font-weight:600;color:#667eea;margin-bottom:12px;">📝 AI 智能生成提示词（可微调）</div>
                        <div class="prompt-grid" id="aiPromptGrid"></div>
                    </div>
                    <div class="model-select">
                        <label>图生成ai模型：</label>
                        <select id="aiModelSelect"></select>
                    </div>
                    <div style="margin-top:12px;display:flex;justify-content:space-between;align-items:center;">
                        <span id="aiGenerateStatus" style="font-size:13px;color:#999;"></span>
                        <button class="btn-ai-generate" id="aiGenerateBtn" onclick="generateAiImages()">🚀 生成全部勾选的主图</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/scraper-product.js?v=15"></script>
    <script src="/js/scraper-title.js?v=2"></script>
    <script src="/js/scraper-ui.js?v=47"></script>
    <script src="/js/scraper-core.js?v=9"></script>
</body>
</html>
