<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 对话 - 蓝海词筛选系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; padding: 30px 20px; }
        h1 { text-align: center; color: #1a1a2e; margin-bottom: 20px; font-size: 24px; }
        .nav-bar { display: flex; gap: 12px; margin-bottom: 30px; justify-content: center; }
        .nav-bar a { padding: 10px 24px; background: #fff; color: #1890ff; border: 2px solid #1890ff; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: 600; transition: all 0.2s; }
        .nav-bar a:hover { background: #1890ff; color: #fff; }
        .nav-bar a.active { background: #1890ff; color: #fff; }

        .chat-card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); overflow: hidden; }

        .system-prompt-section { padding: 15px 20px; border-bottom: 1px solid #e8e8e8; background: #fafafa; }
        .system-prompt-section label { cursor: pointer; color: #666; font-size: 14px; user-select: none; font-weight: 600; }
        .system-prompt-row { display: flex; gap: 10px; margin-top: 10px; align-items: center; }
        .system-prompt-row select { padding: 5px 10px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 13px; background: #fff; cursor: pointer; white-space: nowrap; }
        .system-prompt-section textarea { width: 100%; margin-top: 10px; padding: 10px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 13px; font-family: 'Courier New', monospace; resize: vertical; min-height: 80px; }

        .toolbar { display: flex; align-items: center; gap: 12px; padding: 10px 20px; border-bottom: 1px solid #e8e8e8; background: #fafafa; }
        .toolbar label { font-size: 13px; color: #666; white-space: nowrap; }
        .toolbar select { padding: 5px 10px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 13px; background: #fff; cursor: pointer; }
        .toolbar select:focus { outline: none; border-color: #1890ff; }
        .model-badge { margin-left: auto; font-size: 12px; color: #1890ff; background: #e6f7ff; padding: 2px 10px; border-radius: 10px; }
        .toolbar .clear-btn { margin-left: 12px; padding: 4px 12px; border: 1px solid #d9d9d9; background: #fff; border-radius: 6px; font-size: 12px; color: #999; cursor: pointer; }
        .toolbar .clear-btn:hover { color: #ff4d4f; border-color: #ff4d4f; }

        .messages { height: 500px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        .messages::-webkit-scrollbar { width: 6px; }
        .messages::-webkit-scrollbar-thumb { background: #d9d9d9; border-radius: 3px; }

        .message { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; word-break: break-word; white-space: pre-wrap; }
        .message.user { align-self: flex-end; background: #1890ff; color: #fff; border-bottom-right-radius: 4px; }
        .message.assistant { align-self: flex-start; background: #f5f5f5; color: #333; border-bottom-left-radius: 4px; max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; word-break: break-word; white-space: pre-wrap; }
        .msg-meta { display: flex; gap: 12px; margin-top: 6px; font-size: 10px; color: #888; }
        .msg-meta span { white-space: nowrap; }
        .message.error { align-self: center; background: #fff2f0; color: #ff4d4f; border: 1px solid #ffccc7; }
        .message.assistant.streaming::after { content: '▊'; animation: blink 0.8s infinite; color: #999; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .token-count { font-size: 11px; color: #999; margin-top: 4px; }

        .input-area { display: flex; gap: 10px; padding: 15px 20px; border-top: 1px solid #e8e8e8; }
        .input-area textarea { flex: 1; padding: 10px 14px; border: 1px solid #d9d9d9; border-radius: 8px; font-size: 14px; font-family: inherit; resize: none; height: 44px; line-height: 1.5; }
        .input-area textarea:focus { outline: none; border-color: #1890ff; box-shadow: 0 0 0 2px rgba(24,144,255,0.1); }
        .send-btn { padding: 0 24px; background: #1890ff; color: #fff; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
        .send-btn:hover { background: #40a9ff; }
        .send-btn:disabled { background: #ccc; cursor: not-allowed; }

        .empty-state { display: flex; align-items: center; justify-content: center; height: 100%; color: #bbb; font-size: 15px; }
    </style>
</head>
<body>
<div class="container">
    <h1>AI 对话</h1>
    <div class="nav-bar">
        <a href="/index.html">蓝海词筛选</a>
        <a href="/chat.html" class="active">AI 对话</a>
        <a href="/trend.html">趋势词挖掘</a>
    </div>

    <div class="chat-card">
        <div class="toolbar">
            <label>模型：</label>
            <select id="modelSelect">
                <option value="qwen3.6-plus">qwen3.6-plus</option>
                <option value="qwen3-max">qwen3-max</option>
                <option value="qwen-plus">qwen-plus</option>
                <option value="qwen-turbo">qwen-turbo</option>
            </select>
            <span class="model-badge" id="modelBadge">qwen3.6-plus</span>
            <label style="display:flex;align-items:center;gap:4px;margin-left:auto;cursor:pointer;font-size:13px;color:#666;">
                <input type="checkbox" id="enableSearch"> 联网搜索
            </label>
            <button class="clear-btn" onclick="clearChat()" title="清空聊天记录" style="margin-left:auto;padding:4px 12px;border:1px solid #d9d9d9;background:#fff;border-radius:6px;font-size:12px;color:#999;cursor:pointer;">清空记录</button>
        </div>

        <div class="system-prompt-section">
            <label>System Prompt</label>
            <div class="system-prompt-row">
                <select id="promptTemplate" onchange="loadPromptTemplate()">
                    <option value="">-- 选择模板 --</option>
                    <option value="chat">通用聊天</option>
                    <option value="filter">蓝海词筛选</option>
                </select>
            </div>
            <textarea id="systemPrompt" placeholder="选择模板或手动输入..."></textarea>
        </div>

        <div class="messages" id="messages">
            <div class="empty-state" id="emptyState">开始与 AI 对话...</div>
        </div>

        <div class="input-area">
            <textarea id="userInput" placeholder="输入你的问题..." rows="1"></textarea>
            <button class="send-btn" id="sendBtn">发送</button>
            <button class="send-btn" id="optimizeBtn" style="background:#faad14;font-size:13px;padding:0 16px;" title="根据反馈优化系统提示词">优化提示词</button>
        </div>
    </div>
</div>

<script>
    const messagesDiv = document.getElementById('messages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const systemPromptInput = document.getElementById('systemPrompt');
    const modelSelect = document.getElementById('modelSelect');
    const modelBadge = document.getElementById('modelBadge');
    const emptyState = document.getElementById('emptyState');
    const promptTemplate = document.getElementById('promptTemplate');

    let loading = false;
    let chatAbortController = null;
    let PROMPT_TEMPLATES = {};

    // Load prompt templates from API
    async function loadPromptTemplatesFromApi() {
        try {
            const [chatResp, filterResp] = await Promise.all([
                fetch('/api/filter/prompts/system-prompt'),
                fetch('/api/filter/prompts/system-prompt')
            ]);
            if (chatResp.ok) {
                const chatData = await chatResp.json();
                PROMPT_TEMPLATES.chat = '你是一个 helpful 的 AI 助手。请用简洁清晰的语言回答问题。';
            }
            if (filterResp.ok) {
                const filterData = await filterResp.json();
                PROMPT_TEMPLATES.filter = filterData.prompt;
            }
        } catch (e) {
            PROMPT_TEMPLATES.chat = '你是一个 helpful 的 AI 助手。请用简洁清晰的语言回答问题。';
        }
    }

    loadPromptTemplatesFromApi();

    function loadPromptTemplate() {
        const template = promptTemplate.value;
        if (template && PROMPT_TEMPLATES[template]) {
            systemPromptInput.value = PROMPT_TEMPLATES[template];
            systemPromptInput.focus();
        }
    }

    modelSelect.addEventListener('change', () => {
        modelBadge.textContent = modelSelect.value;
    });

    // Chat history persistence
    function saveMessages(role, content) {
        const history = JSON.parse(localStorage.getItem('chatHistory') || '[]');
        history.push({ role, content, time: Date.now() });
        localStorage.setItem('chatHistory', JSON.stringify(history));
    }

    function getConversationHistory() {
        const history = JSON.parse(localStorage.getItem('chatHistory') || '[]');
        // Only send role + content, strip time field
        return history.map(m => ({ role: m.role, content: m.content }));
    }

    function loadMessages() {
        const history = JSON.parse(localStorage.getItem('chatHistory') || '[]');
        if (history.length === 0) return;
        emptyState.remove();
        history.forEach(msg => {
            const div = document.createElement('div');
            div.className = 'message ' + msg.role;
            div.textContent = msg.content;
            messagesDiv.appendChild(div);
        });
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function clearChat() {
        localStorage.removeItem('chatHistory');
        messagesDiv.innerHTML = '';
        const es = document.createElement('div');
        es.className = 'empty-state';
        es.id = 'emptyState';
        es.textContent = '开始与 AI 对话...';
        messagesDiv.appendChild(es);
    }

    loadMessages();

    function addMessage(role, content) {
        if (emptyState) emptyState.remove();
        const div = document.createElement('div');
        div.className = 'message ' + role;
        div.textContent = content;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function createStreamingMessage() {
        if (emptyState) emptyState.remove();
        const wrapper = document.createElement('div');
        wrapper.style.alignSelf = 'flex-start';

        const div = document.createElement('div');
        div.className = 'message assistant streaming';
        wrapper.appendChild(div);

        const meta = document.createElement('div');
        meta.className = 'msg-meta';
        wrapper.appendChild(meta);

        messagesDiv.appendChild(wrapper);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        return { assistantDiv: div, metaDiv: meta };
    }

    async function send() {
        const msg = userInput.value.trim();
        if (!msg || loading) return;

        loading = true;
        sendBtn.textContent = '停止';
        sendBtn.style.background = '#ff4d4f';
        sendBtn.style.color = '#fff';
        addMessage('user', msg);
        saveMessages('user', msg);
        userInput.value = '';

        chatAbortController = new AbortController();

        const { assistantDiv, metaDiv } = createStreamingMessage();

        const startTime = Date.now();
        const timerInterval = setInterval(() => {
            const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
            metaDiv.textContent = '已等待 ' + elapsed + 's';
        }, 100);

        let fullText = '';
        let usageData = null;

        try {
            const body = { message: msg, model: modelSelect.value, history: getConversationHistory(), enableSearch: document.getElementById('enableSearch').checked };
            const sp = systemPromptInput.value.trim();
            if (sp) body.systemPrompt = sp;

            console.log('[Chat] 发送请求:', JSON.stringify({ message: msg, historyLength: body.history.length }));

            const resp = await fetch('/api/filter/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
                signal: chatAbortController.signal
            });

            console.log('[Chat] HTTP 状态码:', resp.status);

            if (!resp.ok) {
                const text = await resp.text();
                throw new Error('请求失败: ' + text);
            }

            const data = await resp.json();

            clearInterval(timerInterval);

            if (data.error) {
                throw new Error(data.error);
            }

            assistantDiv.textContent = data.reply;
            assistantDiv.classList.remove('streaming');

            const elapsed = ((data.elapsed || 0) / 1000).toFixed(1);
            let statsText = '耗时 ' + elapsed + 's';
            if (data.total_tokens) {
                statsText += '  |  输入 ' + data.prompt_tokens + ' tokens  |  输出 ' + data.completion_tokens + ' tokens  |  总计 ' + data.total_tokens + ' tokens';
            }
            metaDiv.textContent = statsText;
            saveMessages('assistant', data.reply);

            console.log('[Chat] 回复完成:', data.reply.substring(0, 100));
        } catch (e) {
            clearInterval(timerInterval);
            if (e.name === 'AbortError') {
                assistantDiv.textContent = '已取消';
                assistantDiv.classList.remove('streaming');
                metaDiv.textContent = '';
            } else {
                assistantDiv.classList.remove('streaming');
                assistantDiv.className = 'message error';
                assistantDiv.textContent = e.message;
            }
            console.error('[SSE] 错误:', e.message);
        } finally {
            loading = false;
            sendBtn.textContent = '发送';
            sendBtn.style.background = '';
            sendBtn.style.color = '';
            chatAbortController = null;
            userInput.focus();
        }
    }

    function stopChat() {
        if (chatAbortController) {
            chatAbortController.abort();
        }
    }

    sendBtn.addEventListener('click', () => {
        if (loading) {
            stopChat();
            return;
        }
        send();
    });
    userInput.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });

    // Optimize system prompt based on feedback
    const optimizeBtn = document.getElementById('optimizeBtn');
    optimizeBtn.addEventListener('click', async () => {
        const currentPrompt = systemPromptInput.value.trim();
        if (!currentPrompt) {
            alert('请先填写系统提示词');
            return;
        }

        const feedback = prompt('请输入你的反馈（例如：它没有按规则10剔除品牌词 / 输出格式不对等）');
        if (!feedback) return;

        optimizeBtn.disabled = true;
        optimizeBtn.textContent = '优化中...';

        const metaPrompt = `你是一个专业的 Prompt 工程师。请根据以下系统提示词和用户反馈，帮我优化这段提示词。
要求：
1. 保留原有核心意图
2. 针对用户反馈的问题进行针对性改进
3. 只输出优化后的完整提示词，不要解释

【当前提示词】
${currentPrompt}

【用户反馈】
${feedback}为符合符合的蓝海词

请直接输出优化后的提示词：`;

        try {
            const resp = await fetch('/api/filter/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: metaPrompt })
            });
            const data = await resp.json();
            if (data.error) {
                alert('优化失败: ' + data.error);
            } else {
                systemPromptInput.value = data.reply.trim();
            }
        } catch (e) {
            alert('请求失败: ' + e.message);
        } finally {
            optimizeBtn.disabled = false;
            optimizeBtn.textContent = '优化提示词';
        }
    });
</script>
</body>
</html>
